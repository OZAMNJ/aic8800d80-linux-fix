# dnsmasq travel-ap config — AIC8800D80 Travel Router
# Placeholders replaced by install.sh apply_template()
# Do NOT edit directly — run install.sh to configure

# port=0 disables dnsmasq DNS so Unbound/system DNS can use port 53
# Installer will comment this out if USE_UNBOUND=no
port=0
interface={{LAN_IFACE}}
bind-interfaces
dhcp-range={{DHCP_START}},{{DHCP_END}},{{NETMASK}},{{LEASE_TIME}}
dhcp-option=3,{{AP_IP}}
dhcp-option=6,{{AP_IP}}
