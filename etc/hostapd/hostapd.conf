interface=wlan0
driver=nl80211
ssid=YourSSIDHere          # CHANGE — your network name
hw_mode=g
channel=6                  # CHANGE — use 1, 6, or 11; pick least congested
ieee80211n=1
wmm_enabled=1
auth_algs=1
wpa=2
wpa_passphrase=YourPasswordHere  # CHANGE — minimum 8 characters
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
country_code=DE            # CHANGE — your 2-letter country code (US, GB, IN...)
ht_capab=[SHORT-GI-20][SHORT-GI-40][HT40+]
