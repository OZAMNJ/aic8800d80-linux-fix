# hostapd.conf — AIC8800D80 Access Point Template
# Placeholders ({{SSID}}, {{WPA_PSK}}, etc.) are replaced by install.sh
# Do NOT edit directly — run install.sh to configure

interface={{LAN_IFACE}}
driver=nl80211

# Network identity
ssid={{SSID}}

# 2.4 GHz only (AIC8800D80 does not support 5 GHz in AP mode on Linux)
hw_mode=g
channel={{CHANNEL}}

# Explicitly disable 802.11ac (VHT) and 802.11ax (HE/WiFi6) in AP mode
# This device operates as 2.4 GHz 802.11n in AP mode on Linux
ieee80211ac=0
ieee80211ax=0
ieee80211n=1
wmm_enabled=1

# HT capabilities for 802.11n
ht_capab=[SHORT-GI-20][SHORT-GI-40][HT40+]

# Always broadcast SSID (set to 1 to hide)
ignore_broadcast_ssid=0

# Authentication
auth_algs=1
wpa=2
# Password stored here in plain text (unavoidable for hostapd)
# Minimum 8 characters required
wpa_passphrase={{WPA_PSK}}
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Country code — required for regulatory compliance
# Must match your actual country (DE=Germany, US=USA, GB=UK, etc.)
country_code={{COUNTRY_CODE}}

# Maximum number of simultaneous clients
max_num_sta=20

# Send disassociation frame instead of deauth on disconnect
disassoc_low_ack=1
